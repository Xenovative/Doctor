version: '3.8'

services:
  ai-doctor-app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      - OPENROUTER_MAX_TOKENS=${OPENROUTER_MAX_TOKENS:-4000}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
      - ./assets:/app/assets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - ollama
    networks:
      - ai-doctor-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - ai-doctor-network
    profiles:
      - ollama

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-doctor-app
    restart: unless-stopped
    networks:
      - ai-doctor-network
    profiles:
      - nginx

volumes:
  ollama_data:

networks:
  ai-doctor-network:
    driver: bridge
